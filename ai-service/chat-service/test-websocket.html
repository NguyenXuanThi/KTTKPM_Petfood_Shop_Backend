<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetFood AI Chatbot Test</title>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            justify-content: flex-end;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.bot .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message-meta {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .chat-input-wrapper {
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        #messageInput:focus {
            border-color: #667eea;
        }
        #sendButton {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        #sendButton:hover {
            transform: scale(1.05);
        }
        #sendButton:active {
            transform: scale(0.95);
        }
        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #666;
        }
        .status.connected {
            color: #4caf50;
        }
        .status.disconnected {
            color: #f44336;
        }
        .typing-indicator {
            display: none;
            padding: 10px;
            font-size: 12px;
            color: #666;
            font-style: italic;
        }
        .typing-indicator.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🐾 PetFood AI Assistant</h1>
            <p>Trợ lý thông minh của bạn</p>
        </div>
        
        <div class="status" id="status">Đang kết nối...</div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Xin chào! Tôi là trợ lý AI của PetFood. Tôi có thể giúp bạn:
                    <br>• Tìm kiếm sản phẩm
                    <br>• Kiểm tra giá và tồn kho
                    <br>• Đặt hàng nhanh chóng
                    <br><br>Bạn cần tôi giúp gì?
                </div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            Bot đang trả lời...
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Nhập tin nhắn của bạn..."
                    autocomplete="off"
                />
                <button id="sendButton">Gửi</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io('http://localhost:3011');
        const messagesContainer = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');
        const typingIndicator = document.getElementById('typingIndicator');
        
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);
        const sessionId = 'session_' + Date.now();

        // Connection status
        socket.on('connect', () => {
            statusDiv.textContent = '✅ Đã kết nối';
            statusDiv.className = 'status connected';
            socket.emit('join_conversation', { sessionId });
        });

        socket.on('disconnect', () => {
            statusDiv.textContent = '❌ Mất kết nối';
            statusDiv.className = 'status disconnected';
        });

        // Receive message
        socket.on('receive_message', (data) => {
            typingIndicator.classList.remove('show');
            
            if (data.success) {
                addMessage(data.data.assistantMessage, 'bot', data.data.intent);
            }
        });

        // Error handling
        socket.on('error', (data) => {
            typingIndicator.classList.remove('show');
            addMessage('Xin lỗi, đã có lỗi xảy ra. Vui lòng thử lại.', 'bot');
        });

        // Send message
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            messageInput.value = '';

            typingIndicator.classList.add('show');

            socket.emit('send_message', {
                sessionId,
                message,
                userId
            });
        }

        // Add message to UI
        function addMessage(content, sender, intent = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            let metaInfo = '';
            if (intent) {
                metaInfo = `<div class="message-meta">Intent: ${intent}</div>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${content}
                    ${metaInfo}
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Typing indicator
        let typingTimeout;
        messageInput.addEventListener('input', () => {
            clearTimeout(typingTimeout);
            socket.emit('typing', { sessionId, userId });
            typingTimeout = setTimeout(() => {
                // Stop typing
            }, 1000);
        });
    </script>
</body>
</html>
